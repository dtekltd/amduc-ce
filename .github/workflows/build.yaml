name: Build AmDuc Server

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        description: "Tag or version to build (leave empty for main branch)"
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: "dtekltd/amduc"
          token: ${{ secrets.WORKFLOW_PAT }}
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout Tag (if version is not empty)
        if: ${{ inputs.version != '' }}
        run: |
          git checkout ${{ inputs.version }}

      - name: Ensure Main (if version is empty)
        if: ${{ inputs.version == '' }}
        run: |
          echo "Version is empty, staying on main branch"

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: "1.24"
          cache: true

      - name: Build AmDuc Server
        working-directory: .
        run: |
          set -e
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o ./amduc .

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/amduc-ce:latest
